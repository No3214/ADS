name: kads CI
on:
  push: { branches: [ main, master ] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}" }
      - name: Install
        run: pip install -e ".[dev]"
      - name: Doctor (config bütünlüğü)
        run: python -m kads doctor || true
      - name: Validate (RSA + bütçe + CSV)
        run: python -m kads validate
      - name: Tests
        run: python -m pytest -q

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install (e2e)
        run: pip install -e ".[dev,e2e]"
      - name: Playwright browsers (+system deps)
        run: python -m playwright install --with-deps chromium
      - name: HTML statik testler
        run: python -m pytest tests/test_dashboards_html.py -q
      - name: Tarayici e2e (panolar)
        run: python -m pytest e2e/ -q
